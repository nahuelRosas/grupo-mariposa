basePath: /
definitions:
  dto.CreateLoanRequest:
    properties:
      book_id:
        example: 978-0-13-468599-1
        format: uuid
        type: string
      idempotency_key:
        example: loan-attempt-2025-01-15-abc123
        type: string
      user_id:
        example: 3e1ae706-5ca9-4aeb-aa60-c5b7f942969d
        format: uuid
        type: string
    required:
    - book_id
    - user_id
    type: object
  dto.ErrorResponse:
    properties:
      code:
        type: string
      message:
        type: string
      trace_id:
        type: string
    type: object
  dto.LoanListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.LoanResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  dto.LoanResponse:
    properties:
      book_id:
        example: 978-0-13-468599-1
        format: uuid
        type: string
      borrowed_at:
        example: "2025-01-15T10:00:00Z"
        type: string
      id:
        example: 3e1ae706-5ca9-4aeb-aa60-c5b7f942969d
        format: uuid
        type: string
      returned_at:
        example: "2025-02-15T10:00:00Z"
        type: string
      status:
        enum:
        - active
        - returned
        example: active
        type: string
      user_id:
        example: 3e1ae706-5ca9-4aeb-aa60-c5b7f942969d
        format: uuid
        type: string
    type: object
  http.availabilityResponse:
    properties:
      available:
        type: boolean
      availableStock:
        type: integer
      exists:
        type: boolean
      totalStock:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: |-
    Loan Service: registers loans, returns, and validates with Catalog Service that the book exists and has stock. Exposes HTTP and gRPC; Catalog Service consumes HTTP by default and gRPC as a bonus.

    Reverse channel: Loan Service calls Catalog Service via HTTP (`/books/:id`) or gRPC (`BookExists`) to verify availability before registering a loan.
  title: Loan Service
  version: "1.0"
paths:
  /availability/{bookId}:
    get:
      description: Loan Service calls Catalog Service to confirm the book still exists
        and has stock. This is the reverse channel used by the saga.
      parameters:
      - description: Book UUID
        in: path
        name: bookId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.availabilityResponse'
        "400":
          description: invalid uuid
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: book not found in catalog
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "503":
          description: catalog service unavailable
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Check book availability (reverse channel)
      tags:
      - catalog
  /healthz:
    get:
      description: Returns 200 with db=up when the database is reachable; 503 with
        db=down otherwise. Fast and dependency-free for orchestrator healthchecks.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness + DB ping
      tags:
      - health
  /loans:
    get:
      description: Returns a paginated list of loans. Supports filtering by user_id,
        book_id, status, and date range.
      parameters:
      - description: Filter by user UUID
        in: query
        name: user_id
        type: string
      - description: Filter by book UUID
        in: query
        name: book_id
        type: string
      - description: Filter by status
        enum:
        - active
        - returned
        in: query
        name: status
        type: string
      - description: Borrowed at >= from (RFC3339)
        in: query
        name: from
        type: string
      - description: Borrowed at <= to (RFC3339)
        in: query
        name: to
        type: string
      - default: 1
        description: 1-based page index
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (1-100)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoanListResponse'
        "400":
          description: invalid query
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List loans (paginated, filterable)
      tags:
      - loans
    post:
      consumes:
      - application/json
      description: Validates with Catalog Service that the book exists and has stock,
        then persists the loan. Idempotent if `idempotency_key` is supplied.
      parameters:
      - description: Optional dedup key (also accepted in body)
        in: header
        name: X-Idempotency-Key
        type: string
      - description: Loan request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateLoanRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.LoanResponse'
        "400":
          description: invalid input
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: book not found in catalog
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: insufficient stock or duplicate idempotency key
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "503":
          description: catalog service unavailable
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a loan
      tags:
      - loans
  /loans/{id}/return:
    post:
      description: 'Marks the loan as returned and updates the timestamp. Idempotent:
        returning an already-returned loan is a no-op.'
      parameters:
      - description: Loan UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoanResponse'
        "400":
          description: invalid uuid
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: loan not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a return
      tags:
      - loans
produces:
- application/json
schemes:
- http
- https
swagger: "2.0"
